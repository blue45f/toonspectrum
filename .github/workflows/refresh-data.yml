name: Refresh data

# 배포된 Nest API의 인증 ingest 엔드포인트(POST /catalog/ingest/run)를 호출해
# DB catalog_snapshot 을 12시간마다 갱신한다. 서버가 크롤+필드검증+해시 dedup+품질게이트+스냅샷
# 영속을 담당하므로(lib/server/catalog-ingest.ts), 워크플로는 트리거+결과 검증만 한다.
# (마이그레이션으로 lib/data/titles.ts 파일 경로는 폐기됨 — 더 이상 파일을 커밋하지 않는다)
#
# 필요한 GitHub Secrets:
#   WEBDEX_INGEST_URL            배포된 ingest 엔드포인트 전체 URL (예: https://<api-host>/catalog/ingest/run)
#   CATALOG_INGEST_TRIGGER_TOKEN 서버 .env 의 CATALOG_INGEST_TRIGGER_TOKEN 과 동일 값
# 시크릿 미설정 시: 안전하게 skip (워크플로 실패로 처리하지 않음).
on:
  schedule:
    - cron: "23 */12 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "true 면 dedup/품질게이트를 무시하고 강제로 스냅샷을 승격"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger catalog ingest on deployed API
        env:
          INGEST_URL: ${{ secrets.WEBDEX_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.CATALOG_INGEST_TRIGGER_TOKEN }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          if [ -z "${INGEST_URL:-}" ] || [ -z "${INGEST_TOKEN:-}" ]; then
            echo "::notice::WEBDEX_INGEST_URL / CATALOG_INGEST_TRIGGER_TOKEN 미설정 — ingest 트리거를 건너뜁니다."
            exit 0
          fi
          body='{"requestedBy":"github-actions"}'
          if [ "${FORCE:-false}" = "true" ]; then body='{"requestedBy":"github-actions","force":true}'; fi
          echo "POST $INGEST_URL (force=${FORCE:-false})"
          resp=$(curl -sS -m 600 -w $'\n%{http_code}' -X POST "$INGEST_URL" \
            -H "Content-Type: application/json" \
            -H "x-catalog-ingest-token: $INGEST_TOKEN" \
            -d "$body") || { echo "::error::ingest 요청 실패(네트워크/타임아웃)"; exit 1; }
          code=$(printf '%s' "$resp" | tail -n1)
          json=$(printf '%s' "$resp" | sed '$d')
          echo "HTTP $code"
          echo "$json"
          if [ "$code" = "409" ]; then
            echo "::warning::다른 ingest가 진행 중(409) — 이번 실행은 건너뜁니다."; exit 0
          fi
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::ingest 실패 HTTP $code"; exit 1
          fi
          status=$(printf '%s' "$json" | jq -r '.status // empty')
          count=$(printf '%s' "$json" | jq -r '.titleCount // 0')
          echo "status=$status titleCount=$count"
          case "$status" in
            success)
              if [ "$count" -lt 100 ]; then echo "::error::수집 건수 부족 ($count < 100)"; exit 1; fi
              echo "::notice::카탈로그 갱신 성공 ($count편)";;
            aborted)
              echo "::warning::품질 게이트로 승격 거부 — 기존(낡지 않은) 스냅샷 유지. 소스 차단 여부 점검 필요";;
            *)
              echo "::error::예상치 못한 ingest 상태: '$status'"; exit 1;;
          esac
