<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="툰스펙트럼 공유 이미지">
  <defs>
    <!-- Deep studio space background -->
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#110f0c" />
      <stop offset="50%" stop-color="#181512" />
      <stop offset="100%" stop-color="#2a1f18" />
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff884f" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#ff884f" flood-opacity="0.3" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#studioBg)" />
  <circle cx="140" cy="76" r="210" fill="#ff884f" opacity="0.12" />
  <circle cx="1060" cy="570" r="260" fill="#06b6d4" opacity="0.08" />
  <path d="M0 520C220 456 360 584 540 520s312-68 660 18v92H0Z" fill="#181512" opacity="0.85" />

  <!-- Brand logomark (ToonSpectrum icon) -->
  <g transform="translate(88 84) scale(2.05)" filter="url(#softGlow)">
    <rect width="32" height="32" rx="8" fill="#181512" stroke="#2a1f18" stroke-width="1" />
    <circle cx="8" cy="6" r="9" fill="#ff884f" opacity="0.15" />
    <circle cx="25" cy="27" r="8" fill="#06b6d4" opacity="0.1" />
    <!-- Chat bubble frame -->
    <path d="M7.1 6.7h17.8c1.3 0 2.3 1 2.3 2.3v11.3c0 1.3-1 2.3-2.3 2.3h-8.3l-5 3.9c-.6.5-1.5 0-1.3-.8l.6-3.1H7.1c-1.3 0-2.3-1-2.3-2.3V9c0-1.3 1-2.3 2.3-2.3Z" fill="#ffffff" />
    <!-- Spectrum line beams -->
    <path d="M7.1 16h6.2" stroke="#ff884f" stroke-width="2.2" stroke-linecap="round" />
    <path d="M17.1 15.8C20 13 22.1 11.6 25.4 10.7" stroke="#ec4899" stroke-width="2.1" stroke-linecap="round" />
    <path d="M17.3 15.9h8.5" stroke="#f59e0b" stroke-width="2.1" stroke-linecap="round" />
    <path d="M17.1 16.1C20.1 18.1 22.3 19.2 25.6 20.4" stroke="#10b981" stroke-width="2.1" stroke-linecap="round" />
    <path d="M16.5 16.5C19.1 20.1 21.3 22 24.7 23.5" stroke="#06b6d4" stroke-width="2.1" stroke-linecap="round" />
    <!-- Speech arrow overlay -->
    <path d="M12.6 10.7 18.8 16l-6.2 5.3Z" fill="#181512" />
    <path d="M12.6 10.7 18.8 16l-6.2 5.3Z" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.3" />
  </g>

  <!-- Wordmarks -->
  <text x="176" y="124" fill="#ffffff" font-size="40" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">툰스펙트럼</text>
  <text x="378" y="122" fill="#ff884f" font-size="21" font-weight="700" letter-spacing="8" font-family="Space Grotesk, Pretendard, system-ui, sans-serif">WEBTOON · WEBNOVEL SPECTRUM</text>

  <!-- Title Copy -->
  <text x="88" y="268" fill="#ffffff" font-size="78" font-weight="800" letter-spacing="-1" font-family="Apple SD Gothic Neo, Pretendard, system-ui, sans-serif">흩어진 이야기를,</text>
  <text x="88" y="358" fill="url(#spectrum)" font-size="82" font-weight="950" letter-spacing="-1" font-family="Apple SD Gothic Neo, Pretendard, system-ui, sans-serif">취향의 스펙트럼으로.</text>

  <!-- Sub-Description -->
  <text x="88" y="433" fill="#94a3b8" font-size="28" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">네이버·카카오·리디·레진 등 국내 웹툰·웹소설을 가로질러</text>
  <text x="88" y="475" fill="#94a3b8" font-size="28" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">무엇을, 어디서, 왜 봐야 하는지 한 곳에서.</text>

  <!-- Details footer -->
  <circle cx="92" cy="552" r="4.5" fill="#ff884f" />
  <text x="116" y="561" fill="#64748b" font-size="22" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, system-ui, sans-serif">통합 랭킹 · 연재 캘린더 · 교차 플랫폼 가격비교 · 작가별 보기</text>
</svg>
