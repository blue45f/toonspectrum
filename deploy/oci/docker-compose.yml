# WEBDEX 백엔드 스택 — OCI Always-Free ARM VM 한 대에 API + Postgres + Caddy(자동 HTTPS).
# 프론트엔드는 Vercel 유지(무료 글로벌 CDN). Vercel rewrites 가 /api/* 를 이 서버로 프록시 →
# 브라우저는 동일 출처라 CORS 불필요.
#
#   cd deploy/oci && cp .env.example .env && vi .env   # 비밀값 채우기
#   docker compose up -d --build
#   docker compose exec api pnpm exec drizzle-kit push --force   # 최초 1회 스키마 생성

name: webdex

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-webdex}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: ${POSTGRES_DB:-webdex}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 관리/백업용으로 호스트 localhost 에만 노출(외부 미노출).
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webdex} -d ${POSTGRES_DB:-webdex}"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../..
      dockerfile: deploy/oci/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "4001"
      DATABASE_URL: "postgres://${POSTGRES_USER:-webdex}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-webdex}"
      AUTH_SECRET: "${AUTH_SECRET:?set AUTH_SECRET in .env}"
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_KAKAO_ID: ${AUTH_KAKAO_ID:-}
      AUTH_KAKAO_SECRET: ${AUTH_KAKAO_SECRET:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      TZ: Asia/Seoul
    expose:
      - "4001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?set DOMAIN (e.g. api.example.com) in .env}"
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
